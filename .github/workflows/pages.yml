name: Pubblica Atlante di viaggio

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Scarica repository
        uses: actions/checkout@v6

      - name: Configura GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepara sito statico
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Pubblica
        id: deployment
        uses: actions/deploy-pages@v4
